<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="js/trip-city-meta.js"></script>
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <div class="page-bg__parallax"></div>
    <div class="page-bg__tint"></div>
  </div>
  <div class="noise" aria-hidden="true"></div>

  <div class="feed-backdrop" id="feed-backdrop" hidden></div>

  <nav class="city-arrows" aria-label="Switch city">
    <div class="city-arrows__side">
      <a
        data-trip-visible="amsterdam"
        href="city.html?city=paris"
        class="city-arrows__hit"
        aria-label="Paris (previous in carousel)"
        hidden
      >
        <svg class="city-arrows__icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline class="city-arrows__stroke" points="15 18 9 12 15 6" />
        </svg>
      </a>
      <a
        data-trip-visible="paris"
        href="city.html?city=amsterdam"
        class="city-arrows__hit"
        aria-label="Amsterdam (previous in carousel)"
        hidden
      >
        <svg class="city-arrows__icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline class="city-arrows__stroke" points="15 18 9 12 15 6" />
        </svg>
      </a>
    </div>
    <div class="city-arrows__side">
      <a
        data-trip-visible="amsterdam"
        href="city.html?city=paris"
        class="city-arrows__hit"
        aria-label="Paris (next in carousel)"
        hidden
      >
        <svg class="city-arrows__icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline class="city-arrows__stroke" points="9 18 15 12 9 6" />
        </svg>
      </a>
      <a
        data-trip-visible="paris"
        href="city.html?city=amsterdam"
        class="city-arrows__hit"
        aria-label="Amsterdam (next in carousel)"
        hidden
      >
        <svg class="city-arrows__icon" viewBox="0 0 24 24" aria-hidden="true">
          <polyline class="city-arrows__stroke" points="9 18 15 12 9 6" />
        </svg>
      </a>
    </div>
  </nav>

  <header class="masthead">
    <nav class="city-nav" aria-label="Trip cities">
      <a href="index.html" class="city-nav__link">Start</a>
      <span class="city-nav__sep" aria-hidden="true">·</span>
      <span
        data-trip-visible="amsterdam"
        class="city-nav__link city-nav__link--current"
        aria-current="page"
        hidden
        >Amsterdam</span
      >
      <a data-trip-visible="paris" href="city.html?city=amsterdam" class="city-nav__link" hidden>Amsterdam</a>
      <span class="city-nav__sep" aria-hidden="true">·</span>
      <a data-trip-visible="amsterdam" href="city.html?city=paris" class="city-nav__link" hidden>Paris</a>
      <span
        data-trip-visible="paris"
        class="city-nav__link city-nav__link--current"
        aria-current="page"
        hidden
        >Paris</span
      >
    </nav>
    <h1 class="masthead__title" id="trip-masthead-h1">Amsterdam</h1>
    <p class="masthead__kicker" id="trip-masthead-kicker">De Pijp</p>
  </header>

  <main class="feed" id="trip-feed" aria-label="Trip vibes"></main>

  <section class="map-block" id="trip-map-block" aria-label="Map">
    <div class="map-block__frame">
      <iframe
        id="trip-map-iframe"
        title="Map"
        src="about:blank"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen
      ></iframe>
    </div>
    <p class="map-block__note">
      <a id="trip-map-link" href="#" rel="noopener noreferrer" target="_blank">Open in Google Maps</a>
    </p>
  </section>

  <footer class="foot">
    <p id="trip-footer-text">De Pijp</p>
  </footer>

  <script>
    (function () {
      var k = new URLSearchParams(location.search).get("city") === "paris" ? "paris" : "amsterdam";
      var m = window.TRIP_CITY_META[k];
      document.body.className = m.bodyClass;
      document.body.dataset.city = m.dataCity;
      document.title = m.title;
      document.querySelectorAll("[data-trip-visible]").forEach(function (el) {
        el.hidden = el.getAttribute("data-trip-visible") !== k;
      });
      document.getElementById("trip-masthead-h1").textContent = m.h1;
      document.getElementById("trip-masthead-kicker").textContent = m.kicker;
      document.getElementById("trip-feed").setAttribute("aria-label", m.feedAriaLabel);
      document.getElementById("trip-map-block").setAttribute("aria-label", m.mapAriaLabel);
      var ifr = document.getElementById("trip-map-iframe");
      ifr.src = m.mapEmbedSrc;
      ifr.title = m.mapIframeTitle;
      document.getElementById("trip-map-link").href = m.mapLinkHref;
      document.getElementById("trip-footer-text").textContent = m.footerText;
    })();
  </script>
  <script src="app.js" defer></script>
  <script src="js/trip-city-page-init.js" defer></script>
</body>
</html>
