<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var p = location.pathname;
      if (p.endsWith("/") || /\.html?$/i.test(p)) return;
      if (!p || p === "/") return;
      location.replace(location.origin + p + "/" + location.search + location.hash);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Happy 60th, Ma</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Figtree:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">
  <div class="page-bg" aria-hidden="true">
    <div class="page-bg__parallax page-bg__parallax--home-base"></div>
    <div class="page-bg__parallax page-bg__parallax--home-map"></div>
    <div class="page-bg__tint"></div>
  </div>
  <div class="noise" aria-hidden="true"></div>

  <main class="landing">
    <div class="landing__panel">
      <header class="landing__header">
        <p class="landing__kicker">Birthday trip</p>
        <h1 class="landing__title">Happy 60th, Ma.</h1>
        <p class="landing__lede">
          You’ve spent so many years taking care of all of us. This time, it’s our turn.
        </p>
        <p class="landing__lede">
          We’re sending you on a trip—and we put together a few ideas for where to go. No stress, no homework. Just pick the one that makes you smile.
        </p>
        <p class="landing__lede landing__lede--secondary">Love, all of us</p>
      </header>

      <div class="landing__cta-wrap">
        <a
          href="city.html?city=amsterdam"
          class="landing-cta"
          aria-label="Open your birthday trip"
        >
          Open it
        </a>
      </div>
    </div>
  </main>

  <script src="app.js" defer></script>
  <script src="js/trip-bg-music.js" defer></script>
</body>
</html>
