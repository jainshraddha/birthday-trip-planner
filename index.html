<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var p = location.pathname;
      if (p.endsWith("/") || /\.html?$/i.test(p)) return;
      if (!p || p === "/") return;
      location.replace(location.origin + p + "/" + location.search + location.hash);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>For you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">
  <div class="page-bg" aria-hidden="true">
    <div class="page-bg__parallax"></div>
    <div class="page-bg__tint"></div>
  </div>
  <div class="noise" aria-hidden="true"></div>

  <main class="landing">
    <header class="landing__header">
      <p class="landing__eyebrow">Birthday</p>
      <h1 class="landing__title">Hey you</h1>
      <p class="landing__lede">
        We wanted to give you a trip—and we’ve been tucking away little ideas for while you’re there with your friend. None of it is homework; it’s just us, excited for you. Open this whenever you feel like dreaming about it.
      </p>
    </header>

    <div class="landing__cta-wrap">
      <a
        href="city.html?city=amsterdam"
        class="landing-cta"
        aria-label="Open your birthday trip"
      >
        Open it
      </a>
    </div>
  </main>

  <script src="app.js" defer></script>
  <script src="js/trip-bg-music.js" defer></script>
</body>
</html>
